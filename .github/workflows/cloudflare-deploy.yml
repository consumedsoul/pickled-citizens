# Pages auto-deploys via Cloudflare's GitHub integration on push to main.
# This workflow runs typecheck + lint as a sanity gate; it does not deploy.
name: CI

"on":
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
