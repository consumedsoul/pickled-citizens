name = "pickled-citizens"
compatibility_date = "2025-12-14"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = ".open-next/pages"

[vars]
NEXT_PUBLIC_SITE_URL = "https://pickledcitizens.com"
# Clerk publishable key (safe to commit — meant for client-side).
NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_live_Y2xlcmsucGlja2xlZGNpdGl6ZW5zLmNvbSQ"
# Server-only Clerk redirect/landing config (also fine in vars).
NEXT_PUBLIC_CLERK_SIGN_IN_URL = "/auth/signin"
NEXT_PUBLIC_CLERK_SIGN_UP_URL = "/auth"
NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL = "/profile"
NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL = "/auth/complete"

# D1 binding. Run `wrangler d1 create pickled-citizens` and paste the database_id.
[[d1_databases]]
binding = "DB"
database_name = "pickled-citizens"
database_id = "TODO_REPLACE_WITH_REAL_D1_ID"
migrations_dir = "drizzle"